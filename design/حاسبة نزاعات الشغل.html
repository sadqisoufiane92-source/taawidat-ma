<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ميزان — حاسبة نزاعات الشغل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      /* Palette */
      --c-bg:          oklch(97% 0.008 80);      /* warm off-white */
      --c-surface:     oklch(99.5% 0.004 80);    /* card white */
      --c-surface-alt: oklch(96% 0.010 80);      /* subtle tint */
      --c-border:      oklch(88% 0.012 80);
      --c-border-strong: oklch(78% 0.020 80);

      --c-green-900:   oklch(26% 0.080 165);     /* deep header bg */
      --c-green-800:   oklch(31% 0.090 162);
      --c-green-700:   oklch(38% 0.100 160);
      --c-green-600:   oklch(45% 0.115 158);     /* primary */
      --c-green-500:   oklch(55% 0.120 155);
      --c-green-100:   oklch(94% 0.030 155);
      --c-green-50:    oklch(97% 0.018 155);

      --c-gold-600:    oklch(60% 0.120 75);      /* accent */
      --c-gold-500:    oklch(68% 0.130 75);
      --c-gold-200:    oklch(87% 0.060 80);
      --c-gold-50:     oklch(97% 0.025 80);

      --c-text-900:    oklch(18% 0.025 80);
      --c-text-700:    oklch(34% 0.030 80);
      --c-text-500:    oklch(55% 0.025 80);
      --c-text-400:    oklch(65% 0.020 80);

      --c-red-100:     oklch(94% 0.040 25);
      --c-red-600:     oklch(50% 0.160 25);

      /* Type */
      --f-head: 'Noto Kufi Arabic', system-ui, sans-serif;
      --f-body: 'Noto Naskh Arabic', system-ui, sans-serif;

      /* Sizing */
      --r-sm:  6px;
      --r-md:  10px;
      --r-lg:  14px;
      --r-xl:  20px;
      --r-2xl: 28px;

      --shadow-sm:  0 1px 3px oklch(0% 0 0 / .06), 0 1px 2px oklch(0% 0 0 / .04);
      --shadow-md:  0 4px 16px oklch(0% 0 0 / .08), 0 1px 4px oklch(0% 0 0 / .04);
      --shadow-lg:  0 12px 40px oklch(0% 0 0 / .12), 0 2px 8px oklch(0% 0 0 / .06);
    }

    /* ═══════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--f-body);
      font-size: 15px;
      background: var(--c-bg);
      color: var(--c-text-900);
      line-height: 1.7;
      text-wrap: pretty;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, select { font-family: inherit; }
    svg { display: block; flex-shrink: 0; }

    /* ═══════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════ */
    .page { min-height: 100vh; display: flex; flex-direction: column; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 2-column grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
      padding: 32px 0;
    }

    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .results-panel { order: 2; }
      .form-panel { order: 1; }
    }

    /* ═══════════════════════════════════════════════
       TOP BAR
    ═══════════════════════════════════════════════ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--c-green-900);
      color: #fff;
      border-bottom: 1px solid var(--c-green-800);
    }
    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 38px; height: 38px;
      background: var(--c-green-800);
      border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--c-gold-500);
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
    .brand-name {
      font-family: var(--f-head);
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      letter-spacing: .3px;
    }
    .brand-sub { font-size: 11px; color: oklch(80% 0.02 160); }

    .topnav {
      display: flex;
      gap: 4px;
      margin-right: auto;
    }
    .topnav a {
      font-family: var(--f-head);
      font-size: 13px;
      color: oklch(80% 0.02 160);
      padding: 6px 14px;
      border-radius: var(--r-sm);
      transition: color .15s, background .15s;
    }
    .topnav a:hover { color: #fff; background: var(--c-green-800); }

    .topcta {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--f-head);
      font-size: 13px;
      font-weight: 600;
      background: var(--c-gold-600);
      color: var(--c-green-900);
      padding: 8px 16px;
      border-radius: var(--r-md);
      transition: background .15s;
      white-space: nowrap;
    }
    .topcta:hover { background: var(--c-gold-500); }

    @media (max-width: 700px) {
      .topnav { display: none; }
      .topcta span { display: none; }
    }

    /* ═══════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════ */
    .hero {
      background: var(--c-green-900);
      color: #fff;
      position: relative;
      overflow: hidden;
      padding: 64px 24px 72px;
    }
    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--f-head);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--c-gold-500);
      background: oklch(100% 0 0 / .06);
      border: 1px solid oklch(100% 0 0 / .10);
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .hero-title {
      font-family: var(--f-head);
      font-size: clamp(28px, 4.5vw, 44px);
      font-weight: 900;
      line-height: 1.25;
      color: #fff;
      margin-bottom: 20px;
    }
    .hero-title-accent { color: var(--c-gold-500); }

    .hero-text {
      font-size: 16px;
      color: oklch(82% 0.02 160);
      max-width: 600px;
      line-height: 1.8;
      margin-bottom: 36px;
    }
    .hero-stats {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      display: block;
      font-family: var(--f-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--c-gold-500);
    }
    .stat-lbl { font-size: 12px; color: oklch(70% 0.02 160); }
    .stat-divider {
      width: 1px;
      height: 36px;
      background: oklch(100% 0 0 / .12);
    }

    /* Geometric background pattern */
    .hero-pattern {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .hero-tile {
      position: absolute;
      border: 1px solid oklch(100% 0 0 / .04);
      border-radius: 4px;
      background: oklch(100% 0 0 / .02);
    }
    .hero-tile:nth-child(1) { width: 300px; height: 300px; right: -80px; top: -80px; transform: rotate(30deg); }
    .hero-tile:nth-child(2) { width: 200px; height: 200px; right: 160px; top: -40px; transform: rotate(15deg); }
    .hero-tile:nth-child(3) { width: 180px; height: 180px; right: 40px; bottom: -60px; transform: rotate(45deg); }
    .hero-tile:nth-child(4) { width: 120px; height: 120px; right: 320px; bottom: 20px; transform: rotate(20deg); }

    /* ═══════════════════════════════════════════════
       AD SLOTS
    ═══════════════════════════════════════════════ */
    .ad-slot {
      width: 100%;
      background: var(--c-surface);
      border: 1px dashed var(--c-border-strong);
      border-radius: var(--r-md);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ad-top { margin-top: 24px; }
    .ad-bottom { margin-bottom: 24px; }
    .ad-tag {
      font-family: var(--f-head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--c-text-400);
      background: var(--c-surface-alt);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--c-border);
      white-space: nowrap;
    }
    .ad-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      gap: 12px;
    }
    .ad-body > span:first-child { font-size: 13px; color: var(--c-text-400); }
    .ad-meta { font-size: 11px; color: var(--c-text-400); }

    /* ═══════════════════════════════════════════════
       PANEL
    ═══════════════════════════════════════════════ */
    .panel {
      background: var(--c-surface);
      border-radius: var(--r-xl);
      border: 1px solid var(--c-border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 24px 24px 0;
    }
    .panel-head-sub {
      padding-top: 20px;
      border-top: 1px solid var(--c-border);
      margin-top: 24px;
    }
    .panel-step {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--c-green-600);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-head);
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
    }
    .panel-step-accent { background: var(--c-gold-600); color: var(--c-green-900); }

    .panel-title {
      font-family: var(--f-head);
      font-size: 18px;
      font-weight: 800;
      color: var(--c-text-900);
      line-height: 1.3;
    }
    .panel-sub { font-size: 13px; color: var(--c-text-500); margin-top: 2px; }
    .panel-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
    .panel-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px 24px;
      border-top: 1px solid var(--c-border);
    }

    /* ═══════════════════════════════════════════════
       FORM FIELDS
    ═══════════════════════════════════════════════ */
    .field { display: flex; flex-direction: column; gap: 7px; }
    .field-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--f-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--c-text-700);
    }
    .field-label svg { color: var(--c-green-600); }
    .field-hint { font-size: 12px; color: var(--c-text-400); }
    .field-error {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--c-red-600);
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input {
      width: 100%;
      padding: 11px 16px;
      font-family: var(--f-body);
      font-size: 15px;
      color: var(--c-text-900);
      background: var(--c-bg);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      text-align: right;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .input:focus {
      border-color: var(--c-green-600);
      box-shadow: 0 0 0 3px oklch(45% .115 158 / .12);
    }
    .input:hover:not(:focus) { border-color: var(--c-border-strong); }
    .input-suffix {
      position: absolute;
      left: 14px;
      font-size: 13px;
      color: var(--c-text-500);
      pointer-events: none;
    }
    .input-date { cursor: pointer; }

    /* Remove number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Segmented control */
    .segmented {
      display: flex;
      gap: 6px;
      background: var(--c-surface-alt);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      padding: 4px;
    }
    .segment {
      flex: 1;
      padding: 9px 12px;
      font-family: var(--f-head);
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text-500);
      border-radius: var(--r-sm);
      transition: all .15s;
      text-align: center;
    }
    .segment:hover:not(.is-active) { color: var(--c-text-700); background: var(--c-border); }
    .segment.is-active {
      background: var(--c-green-600);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      background: var(--c-surface-alt);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      text-align: right;
      transition: border-color .15s, background .15s;
    }
    .toggle-row:hover { border-color: var(--c-green-600); }
    .toggle-row.is-on { border-color: var(--c-green-600); background: var(--c-green-50); }
    .toggle-text { display: flex; flex-direction: column; gap: 2px; }
    .toggle-label { font-family: var(--f-head); font-size: 14px; font-weight: 700; color: var(--c-text-900); }
    .toggle-desc { font-size: 12px; color: var(--c-text-500); text-align: right; }
    .toggle-track {
      position: relative;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: var(--c-border-strong);
      flex-shrink: 0;
      transition: background .2s;
    }
    .is-on .toggle-track { background: var(--c-green-600); }
    .toggle-knob {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px oklch(0% 0 0 / .20);
      transition: transform .2s;
    }
    .is-on .toggle-knob { transform: translateX(-18px); }

    /* Compensation cards grid */
    .comp-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 24px;
    }
    .comp-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      background: var(--c-surface-alt);
      text-align: right;
      transition: border-color .15s, background .15s, box-shadow .15s;
      cursor: pointer;
    }
    .comp-card:hover { border-color: var(--c-green-500); box-shadow: var(--shadow-sm); }
    .comp-card.is-selected {
      border-color: var(--c-green-600);
      background: var(--c-green-50);
      box-shadow: 0 0 0 2px oklch(45% .115 158 / .10);
    }
    .comp-card-checkmark {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--c-border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all .15s;
      color: #fff;
    }
    .is-selected .comp-card-checkmark {
      background: var(--c-green-600);
      border-color: var(--c-green-600);
    }
    .comp-card-body { display: flex; flex-direction: column; gap: 3px; }
    .comp-card-title {
      font-family: var(--f-head);
      font-size: 14px;
      font-weight: 800;
      color: var(--c-text-900);
    }
    .comp-card-desc { font-size: 12px; color: var(--c-text-500); line-height: 1.5; }
    .comp-card-article {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-green-600);
      font-family: var(--f-head);
    }

    /* ═══════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════ */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      background: var(--c-green-600);
      color: #fff;
      font-family: var(--f-head);
      font-size: 15px;
      font-weight: 800;
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      transition: background .15s, transform .1s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--c-green-700); box-shadow: var(--shadow-md); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { opacity: .65; cursor: not-allowed; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 18px;
      color: var(--c-text-500);
      font-family: var(--f-head);
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--c-border-strong); color: var(--c-text-700); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid oklch(100% 0 0 / .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════════
       ALERT
    ═══════════════════════════════════════════════ */
    .alert {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid;
    }
    .alert-error {
      background: var(--c-red-100);
      color: var(--c-red-600);
      border-color: var(--c-red-600);
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--f-head);
    }
    .badge-ok { background: var(--c-green-100); color: var(--c-green-700); }
    .badge-warn { background: oklch(94% 0.04 60); color: oklch(40% 0.10 60); }

    /* ═══════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px;
      gap: 12px;
    }
    .empty-illus {
      width: 72px;
      height: 72px;
      background: var(--c-green-50);
      border: 1.5px solid var(--c-green-100);
      border-radius: var(--r-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-green-600);
      margin-bottom: 8px;
    }
    .empty-title {
      font-family: var(--f-head);
      font-size: 16px;
      font-weight: 800;
      color: var(--c-text-700);
    }
    .empty-text { font-size: 13px; color: var(--c-text-500); max-width: 320px; line-height: 1.7; }
    .empty-checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .empty-checklist li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--c-text-500);
    }
    .empty-checklist svg { color: var(--c-green-600); }

    /* ═══════════════════════════════════════════════
       RESULT CARDS
    ═══════════════════════════════════════════════ */
    .results-panel { position: sticky; top: 76px; }
    .results-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    @media (max-width: 960px) {
      .results-panel { position: static; }
    }

    .result-card {
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      background: var(--c-surface);
      box-shadow: var(--shadow-sm);
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--c-green-900), var(--c-green-800));
      color: #fff;
    }
    .result-head-left { display: flex; align-items: center; gap: 10px; }
    .result-index {
      font-family: var(--f-head);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      color: oklch(70% 0.05 160);
    }
    .result-title {
      font-family: var(--f-head);
      font-size: 15px;
      font-weight: 800;
      color: #fff;
    }
    .result-amount-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .result-amount-label { font-size: 10px; color: oklch(70% 0.03 160); font-family: var(--f-head); letter-spacing: .5px; }
    .result-amount {
      font-family: var(--f-head);
      font-size: 15px;
      font-weight: 800;
      color: var(--c-gold-500);
    }

    .result-body {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .result-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--c-border);
    }
    .result-row:last-child { border-bottom: none; }
    .result-row.is-emph {
      background: var(--c-green-50);
      padding: 8px 10px;
      border-radius: var(--r-sm);
      border: 1.5px solid var(--c-green-100);
      margin-top: 4px;
    }
    .row-key { font-weight: 600; color: var(--c-text-700); flex-shrink: 0; }
    .row-val { color: var(--c-text-900); text-align: left; direction: ltr; }
    .row-val strong { color: var(--c-green-700); font-weight: 800; }

    /* Brackets and phases */
    .brackets, .phases {
      background: var(--c-surface-alt);
      border: 1px solid var(--c-border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bracket-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12.5px;
      color: var(--c-text-700);
    }
    .bracket-row > span:last-child { direction: ltr; text-align: left; }

    .phase {
      border-bottom: 1px solid var(--c-border);
      padding-bottom: 10px;
    }
    .phase:last-child { border-bottom: none; padding-bottom: 0; }
    .phase-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .phase-num {
      font-family: var(--f-head);
      font-size: 12px;
      font-weight: 800;
      color: var(--c-green-700);
      background: var(--c-green-100);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .phase-range { font-size: 12px; color: var(--c-text-500); }
    .phase-body { display: flex; flex-direction: column; gap: 4px; }
    .phase-body p {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12.5px;
    }

    /* ═══════════════════════════════════════════════
       TOTAL CARD
    ═══════════════════════════════════════════════ */
    .total-card {
      position: relative;
      background: linear-gradient(135deg, var(--c-green-900), var(--c-green-800));
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: fadeUp .35s ease .1s both;
    }
    .total-pattern {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        oklch(100% 0 0 / .02) 0px,
        oklch(100% 0 0 / .02) 1px,
        transparent 1px,
        transparent 12px
      );
    }
    .total-inner {
      position: relative;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .total-meta { display: flex; flex-direction: column; gap: 4px; }
    .total-eyebrow {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--f-head);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--c-gold-200);
    }
    .total-sub { font-size: 12px; color: oklch(65% 0.02 160); }
    .total-amount {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .total-amount-num {
      font-family: var(--f-head);
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 900;
      color: var(--c-gold-500);
      direction: ltr;
    }
    .total-amount-curr {
      font-family: var(--f-head);
      font-size: 20px;
      font-weight: 700;
      color: var(--c-gold-200);
    }
    .total-disclaimer {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid oklch(100% 0 0 / .10);
      font-size: 11px;
      color: oklch(60% 0.02 160);
      line-height: 1.6;
    }
    .total-disclaimer svg { flex-shrink: 0; margin-top: 2px; color: oklch(55% 0.02 160); }

    /* ═══════════════════════════════════════════════
       LEGAL STRIP
    ═══════════════════════════════════════════════ */
    .legal-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 0 0 32px;
    }
    @media (max-width: 700px) { .legal-strip { grid-template-columns: 1fr; } }

    .legal-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 18px;
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-lg);
    }
    .legal-item svg { color: var(--c-green-600); flex-shrink: 0; margin-top: 2px; }
    .legal-item h4 {
      font-family: var(--f-head);
      font-size: 14px;
      font-weight: 800;
      color: var(--c-text-900);
      margin-bottom: 4px;
    }
    .legal-item p { font-size: 12.5px; color: var(--c-text-500); line-height: 1.6; }

    /* ═══════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════ */
    .site-foot {
      background: var(--c-green-900);
      color: oklch(70% 0.02 160);
      border-top: 1px solid var(--c-green-800);
      margin-top: auto;
    }
    .site-foot-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .site-foot .brand-name { font-size: 15px; }
    .site-foot .brand-sub { font-size: 10px; }
    .site-foot-text { font-size: 12px; }

    /* ═══════════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-border-strong); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="labor-logic.js"></script>
  <script type="text/babel" src="labor-page.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LaborPage />);
  </script>
</body>
